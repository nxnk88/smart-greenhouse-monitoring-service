apiVersion: apps/v1
kind: Deployment
metadata:
  name: greenhouse-monitor-deployment
  namespace: greenhouse-monitoring
  labels:
    app: greenhouse-monitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: greenhouse-monitor
  template:
    metadata:
      labels:
        app: greenhouse-monitor
    spec:
      containers:
        - name: greenhouse-monitor
          image: xzxzxzxze/smart-greenhouse-monitoring-service:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20

